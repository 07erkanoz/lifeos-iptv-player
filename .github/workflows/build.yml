name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── Linux .deb ───────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev \
            libmpv-dev mpv \
            dpkg-dev

      - name: Build Linux
        run: flutter build linux --release

      - name: Create .deb package
        run: |
          APP_NAME="lifeostv"
          # Debian package version must start with a digit.
          # For tag runs, use tag version (v1.2.3 -> 1.2.3).
          # For workflow_dispatch on branches, generate a valid fallback version.
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME:-}" =~ ^v?[0-9] ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="1.0.0+${GITHUB_RUN_NUMBER:-0}"
          fi
          # Keep only Debian-safe characters.
          VERSION="$(echo "$VERSION" | sed 's/[^0-9A-Za-z.+:~-]/-/g')"
          # Final guard: ensure version starts with a digit.
          if [[ ! "$VERSION" =~ ^[0-9] ]]; then
            VERSION="1.0.0+$VERSION"
          fi
          PKG_DIR="${APP_NAME}_${VERSION}_amd64"

          mkdir -p "$PKG_DIR/DEBIAN"
          mkdir -p "$PKG_DIR/usr/bin"
          mkdir -p "$PKG_DIR/usr/lib/$APP_NAME"
          mkdir -p "$PKG_DIR/usr/share/applications"
          mkdir -p "$PKG_DIR/usr/share/pixmaps"

          # Copy build output
          cp -r build/linux/x64/release/bundle/* "$PKG_DIR/usr/lib/$APP_NAME/"

          # Launcher script
          cat > "$PKG_DIR/usr/bin/$APP_NAME" << 'LAUNCHER'
          #!/bin/bash
          exec /usr/lib/lifeostv/lifeostv "$@"
          LAUNCHER
          chmod +x "$PKG_DIR/usr/bin/$APP_NAME"

          # Desktop entry
          cat > "$PKG_DIR/usr/share/applications/$APP_NAME.desktop" << DESKTOP
          [Desktop Entry]
          Type=Application
          Name=LifeOS TV
          Comment=IPTV Player
          Exec=$APP_NAME
          Icon=$APP_NAME
          Terminal=false
          Categories=AudioVideo;Video;Player;
          DESKTOP

          # Icon
          cp assets/app_icon_256.png "$PKG_DIR/usr/share/pixmaps/$APP_NAME.png"

          # Control file
          cat > "$PKG_DIR/DEBIAN/control" << CONTROL
          Package: $APP_NAME
          Version: $VERSION
          Section: video
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libmpv2 | libmpv1, libc6
          Maintainer: erkanoz <erkanoz07@gmail.com>
          Description: LifeOS IPTV Player
           Full-featured IPTV player with M3U/Xtream Codes support,
           OpenSubtitles integration, and multi-platform desktop experience.
          CONTROL

          dpkg-deb --build "$PKG_DIR"
          mv "${PKG_DIR}.deb" "LifeosTV-${VERSION}-linux-amd64.deb"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: "*.deb"

  # ─── Windows ──────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Windows
        run: flutter build windows --release

      - name: Create zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          if (-not $version) { $version = "1.0.0" }
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "LifeosTV-$version-windows-x64.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: "*.zip"

  # ─── Android APK ─────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-1.0.0}"
          cp build/app/outputs/flutter-apk/app-release.apk "LifeosTV-${VERSION}-android.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: "*.apk"

  # ─── Release ──────────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.deb
            *.zip
            *.apk
