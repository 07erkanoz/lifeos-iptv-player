name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── Linux .deb ───────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libmpv-dev mpv \
            dpkg-dev

      - name: Build Linux
        run: flutter build linux --release

      - name: Create .deb package
        run: |
          APP_NAME="lifeostv"
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-1.0.0}"
          PKG_DIR="${APP_NAME}_${VERSION}_amd64"

          mkdir -p "$PKG_DIR/DEBIAN"
          mkdir -p "$PKG_DIR/usr/bin"
          mkdir -p "$PKG_DIR/usr/lib/$APP_NAME"
          mkdir -p "$PKG_DIR/usr/share/applications"
          mkdir -p "$PKG_DIR/usr/share/pixmaps"

          # Copy build output
          cp -r build/linux/x64/release/bundle/* "$PKG_DIR/usr/lib/$APP_NAME/"

          # Launcher script
          cat > "$PKG_DIR/usr/bin/$APP_NAME" << 'LAUNCHER'
          #!/bin/bash
          exec /usr/lib/lifeostv/lifeostv "$@"
          LAUNCHER
          chmod +x "$PKG_DIR/usr/bin/$APP_NAME"

          # Desktop entry
          cat > "$PKG_DIR/usr/share/applications/$APP_NAME.desktop" << DESKTOP
          [Desktop Entry]
          Type=Application
          Name=LifeOS TV
          Comment=IPTV Player
          Exec=$APP_NAME
          Icon=$APP_NAME
          Terminal=false
          Categories=AudioVideo;Video;Player;
          DESKTOP

          # Icon
          cp assets/app_icon_256.png "$PKG_DIR/usr/share/pixmaps/$APP_NAME.png"

          # Control file
          cat > "$PKG_DIR/DEBIAN/control" << CONTROL
          Package: $APP_NAME
          Version: $VERSION
          Section: video
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libmpv2 | libmpv1, libc6
          Maintainer: erkanoz <erkanoz07@gmail.com>
          Description: LifeOS IPTV Player
           Full-featured IPTV player with M3U/Xtream Codes support,
           OpenSubtitles integration, and multi-platform desktop experience.
          CONTROL

          dpkg-deb --build "$PKG_DIR"
          mv "${PKG_DIR}.deb" "LifeosTV-${VERSION}-linux-amd64.deb"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: "*.deb"

  # ─── Windows ──────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Windows
        run: flutter build windows --release

      - name: Create zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          if (-not $version) { $version = "1.0.0" }
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "LifeosTV-$version-windows-x64.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: "*.zip"

  # ─── macOS ────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build macOS
        run: flutter build macos --release

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-1.0.0}"
          APP_PATH="build/macos/Build/Products/Release/lifeostv.app"
          DMG_NAME="LifeosTV-${VERSION}-macos.dmg"

          mkdir -p dmg_temp
          cp -r "$APP_PATH" dmg_temp/
          ln -s /Applications dmg_temp/Applications
          hdiutil create -volname "LifeOS TV" -srcfolder dmg_temp -ov -format UDZO "$DMG_NAME"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: "*.dmg"

  # ─── Release ──────────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.deb
            *.zip
            *.dmg
